<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>指定日历 - WhyCalendar</title>
  <meta name="description" content="按日期区间生成 iOS 风格日历并导出为图片" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="designated-calendar.css" />
</head>
<body>
  <div class="bg-canvas" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>

  <div class="page-wrap">
    <div class="top-bar">
      <a href="index.html" class="back-link">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        返回
      </a>
      <span class="page-title">指定日历</span>
    </div>

    <div class="content-layout">
    <!-- Control Card -->
    <section class="control-card" aria-label="日期区间">
      <p class="hint">选择要生成日历的<strong>连续日期区间</strong>（含首尾）。下方白底区域即为导出内容，可下载为 PNG。</p>

      <div class="control-row">
        <div class="field">
          <label for="rangeStart">开始日期</label>
          <input type="date" id="rangeStart" />
        </div>
        <div class="field">
          <label for="rangeEnd">结束日期</label>
          <input type="date" id="rangeEnd" />
        </div>
      </div>

      <!-- Options -->
      <div class="opts-grid" aria-label="显示选项">
        <label class="opt-row">
          <span class="opt-label">深色模式</span>
          <div class="opt-toggle">
            <input type="checkbox" id="optDarkMode" class="toggle-input" />
            <span class="toggle-track"></span>
          </div>
        </label>
        <label class="opt-row">
          <span class="opt-label">隐藏计划外的日期</span>
          <div class="opt-toggle">
            <input type="checkbox" id="optHideOot" class="toggle-input" checked />
            <span class="toggle-track"></span>
          </div>
        </label>
        <label class="opt-row">
          <span class="opt-label">月份分割线</span>
          <div class="opt-toggle">
            <input type="checkbox" id="optMonthDivider" class="toggle-input" />
            <span class="toggle-track"></span>
          </div>
        </label>
        <label class="opt-row">
          <span class="opt-label">突出今日</span>
          <div class="opt-toggle">
            <input type="checkbox" id="optToday" class="toggle-input" checked />
            <span class="toggle-track"></span>
          </div>
        </label>
        <label class="opt-row">
          <span class="opt-label">圆角</span>
          <div class="opt-toggle">
            <input type="checkbox" id="optRoundedCorner" class="toggle-input" checked />
            <span class="toggle-track"></span>
          </div>
        </label>
        <label class="opt-row">
          <span class="opt-label">导出分辨率</span>
          <select id="optResolution" class="resolution-select">
            <option value="720p">720p</option>
            <option value="1080p">1080p</option>
            <option value="2K">2K</option>
            <option value="4K" selected>4K</option>
            <option value="8K">8K</option>
          </select>
        </label>
      </div>

      <!-- Font customization -->
      <div class="font-row" aria-label="字体设置">
        <div class="font-field">
          <label for="fontEn">英文字体</label>
          <select id="fontEn">
            <option value="system">系统默认</option>
            <option value="Arial">Arial</option>
            <option value="Helvetica">Helvetica</option>
            <option value="Segoe UI">Segoe UI</option>
            <option value="Tahoma">Tahoma</option>
            <option value="Verdana">Verdana</option>
            <option value="Trebuchet MS">Trebuchet MS</option>
            <option value="Georgia">Georgia</option>
            <option value="Times New Roman">Times New Roman</option>
            <option value="Cambria">Cambria</option>
            <option value="Garamond">Garamond</option>
            <option value="Courier New">Courier New</option>
            <option value="Consolas">Consolas</option>
            <option value="Impact">Impact</option>
          </select>
        </div>
        <div class="font-field">
          <label for="fontCn">中文字体</label>
          <select id="fontCn">
            <option value="system">系统默认</option>
            <option value="Microsoft YaHei">微软雅黑</option>
            <option value="DengXian">等线</option>
            <option value="PingFang SC">苹方</option>
            <option value="Heiti SC">黑体-简</option>
            <option value="STHeiti">华文黑体</option>
            <option value="SimHei">黑体</option>
            <option value="SimSun">宋体</option>
            <option value="Noto Sans SC">思源黑体</option>
            <option value="FangSong">仿宋</option>
            <option value="KaiTi">楷体</option>
          </select>
        </div>
      </div>

      <div class="actions">
        <button type="button" class="btn btn-primary" id="btnRender">生成日历</button>
        <button type="button" class="btn btn-secondary" id="btnDownload" disabled>下载为图片</button>
      </div>
      <p class="status-msg" id="statusMsg" role="status"></p>
    </section>

    <!-- Only this node is captured by html2canvas -->
    <div id="exportRoot" aria-label="日历预览"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/lunar-javascript/1.6.12/lunar.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" crossorigin="anonymous"></script>
  <script src="designated-calendar.js"></script>
</body>
</html>
